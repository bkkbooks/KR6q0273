body:
  text: 楞伽寶山高四面無行路惟有達道人乘空到彼處羅漢若悟空擲錫騰空去緣覺若悟空醒見三生事菩薩若悟空十方同一處諸佛若悟空妙理空中住空理真法身法身即常住佛身祇這是迷人自不悟一切若不空苦厄從何度大海濶三千巨深五六萬余特七尺軀入裏飲一頓當時枯竭盡龍王自出現大閲經藏門請為說一遍依如說無法龍王悟知見賣君髻中珠隱在如來殿戴將軍陳頭賊降不敢戰世上有仁人得永離貧賤不貪有為身當見如來面日輪漸漸短光陰一何促身如水上沫命似當風燭常須慎四蛇持心捨三毒相見論修道更莫著淫欲淫欲暫時情長劫入地獄縱令得出來異形人不識或時成四足或是總無足可惜好人身變作醜頭畜今日預報知行行須努力余家久住山早已離城市草屋有三間一間長丈二一間安葛五一間塵六四余家自內房終日間無事昨因黑月二十五初夜飲酒醉兩人相渾雜種種調言氣余家不奈煩放火燒屋𧂐葛五成灰燼塵六無一二有物蕩淨盡惟餘空間地自身赤裸裸體上無衣被更莫憂盜賊逍遙安樂睡一等被火燒同行不同利出家捨煩惱煩惱還同住癡心覔福田騃意承救度十二因緣管無繇免來去依智不依識依義不依語佛心一子地蠢動皆男女平等如虗空善惡俱無取既不造天堂誰受三塗苦有法盡無餘乘空能自度神作如來身智作如來庫涌出波羅蜜流通正道路渾身總是佛迷人自不悟八十隨形好相有三十二四諦及三乘同一無生智名為一合相非是人同䫫凡夫共佛同一體無有異若論心與境懸隔不相似凡夫惟妄想攀緣遍天地常懷三毒心損他將自利佛心常慈悲善惡無有二蠢動諸衆生心同一子地六識空無生六塵將布施意根成妙覺七識平等智富兒空手行貧兒把他物被物牽入廛買賣不得出覺暮便歸舍黃昏黑漆漆所求不稱意合家總啾唧自無般若性乏缺波羅蜜把繩入草裏自繫百年畢實是可憐許冥冥不見日富兒雖空手家中甚富溢自有無盡藏不假外緣物周流用不窮要者從理出古時不異今今時不異古生事日日滅有所不能作音做世上乏錢財守空無貨賂理詩日日新朽宅時時故聞船未破漏愛河須早渡出過三江口逍遙神自悟損之又損之俄成貝多樹臨行途路難無船可相渡業老見閻公沒你分踈處若見優曇花處處無疑慮世上蠢蠢者相見只論錢張三五百貫李四有幾千趙大折却本王六大迍邅口常談三業心中欲火然癡狼咬肚熱貪鬼撮頭牽有腳復有足開眼常睡眠羅剎同心腹何日見青天青天不可見地獄結因緣故宅守真妻不好求外色真妻生男女長大同榮辱外色有男女長成愛作賊有妻纍我來牽我入牢獄我亦早識渠誘引入吾室內外總團圓同餐一鉢食食飽斷虗妄無相即無福若論真寂理同歸無所得昔日在有時常被有人欺一相生分別見聞多是非已後入無時又被無人欺一向看心坐冥冥無所知有無俱是執何處是無為有無同一體諸相盡皆離心同虗空故虗空是我師若論無相理惟我父王知老來無氣力房舍不能修基頽柱根朽椽梠脫差抽泥塗零落盡四壁空颼颼舉頭看梁柱星星見白頭慧雲降法雨智水沃心流家中空豁豁屋倒亦何憂山莊草庵破余歸大宅游生生不揀處隨䫫說無求人有五般花花蘭一作爛變成香氤氳滿故宅供養本爺娘有人見不識報道十月桑外塵一念愛合成五色囊囊中起三柱柱上有千梁梁邊成地獄地獄作天堂緣箇一群賊自作自消亡縱令存草命何時還故鄉文字說定慧定慧是爺娘何不依理智逐色在他鄉早須歸大宅孝順見爺娘爺娘聞子來端坐見咍咍我所有寶藏分付鑰匙開非論窮子富舉國免三灾如意用無盡更不受胞胎逍遙無障礙終日見如來如來愍諸子平等無高下諸子自愚癡所以難教化直心是道場子心轉姦詐遣子淨三業轉愛論俗話遣子內修真向外轉尋假遣子學無相捻他有相把無諍最第一論義成相罵無貪勝布施無癡勝坐禪無瞋勝持戒無念勝求緣盡見凡夫事夜來安樂眠寒時向火坐火本實無煙不忌黑暗女不求功德天任運生方便皆同般若船若能如是學功德實無邊十方同一等此是真如寺裏有無量壽本來無名字凡夫不入理心緣世上事乞錢買瓦木蓋他虗空地却被六賊驅背却真如智終日受艱辛妄想圖名利如此學道人纍劫終不至無有報龐大空空無處坐家內空空空空空無有貨日在空裏行日沒空裏臥空坐空吟詩詩空空相和莫怪純用空空是諸佛座世人不別寶空即是實貨若嫌無有空自是諸佛過有人有所知有事有是非聞道無相理心執不生疑五歲更不長祇作阿孩兒將拳口裏咬百年不肯離假花雖端正究竟不充饑都緣癡孩子不識是權宜如來無相理有作盡皆非合瞋不須瞋合喜不須喜喜即淫欲生瞋即毒蛇起毒蛇起猛火淫欲成貪鬼猛火和貪鬼癡狼咈心底妄想如恆沙煩惱無遮止無明黑漆漆渴來飲鹹水終日緣事走不肯入空理我見好畜生知是嘍羅漢枉法取人錢誇道能計算得即渾家用受苦沒人伴有力任他騎棒鞭脊上楦觜上著龓頭口中銜鐵片項領被磨穿鼻孔芒繩絆自種還自收佛也不能斷癡兒無智慧自嫌阿爺醜阿娘生得身嫌娘無面首拋却親爺娘外邊逐色走六親相將作尋常不間口恆遊十二月月月飲欲酒夜夜不曾醒醉吐飼猪狗如此惡男子緣事不了手余有一寶劒非是世間鐵成來更不磨晶晶白如雪氣衝浮雲散光照三千徹吼作師子聲百獸皆腦裂外國盡歸降衆生悉磨滅滅已復還生還生作金鐍古穴帶將處處行樂者即為說知余轉般若見余轉金剛合掌恭敬了不動見空王亦勝身命施亦勝坐天堂亦勝五臺供亦勝求西方於住而無住其福不可量有為如夢幻無相契真常如來大慈悲廣演波羅蜜了知三界苦殷勤勸君出得之不肯修實是頑皮物他是已成佛汝是當成佛當成自不成是誰之過失已後纍劫苦莫尤過去佛誰家郎君子開眼造地獄枉法取人錢養那一群賊饒伊家戶大業成出不得除非輪回滿換形償他力看君騎底驢總是如此色無事被鞭杖有理說不得愚人打瓮破求人望錮護惡法得錢財布施擬補處物色不相當此事無煩做縱然有少福那將地獄去罪福當頭行何時相值遇自本猶折却安得有利路先須持五戒方始得人身有財將布施身即不窮貧若行十善業聞道得天人天人生滅福來去如車輪有為接梵世不及一毫真更欲談玄妙慮恐法王瞋一皮較一皮孫子不如兒坐禪勝讀經讀經勝有為尋文不識理棄母養阿姨阿姨是色身阿娘是法體色身是文字法入無為理文字有生滅無相宛然爾佛教本無妄句句須論實尅己饒益他俗所謂陰騭遮莫是天王饒君宰相姪世間有貴賤業力還同一語汝富貴人貧兒莫欺屈習重業力成翻覆難得出自恨己身癡有事無人知橫展兩腳睡至曉不尋思諸佛為我爺我是世尊兒兒今已長大替父為導師父子同宅住寸步不相離法身無相貌世人那得知此箇一群賊生生欺主人即今識汝也不共汝相親你若不伏我我則處處說教人總識汝遣汝行路絶你若能伏我我亦不分別共汝同一身永離於生滅世人重珍寶我則不如然名聞即知足富貴心不緣唯樂簞瓢飲無求澡鏡銓饑食西山稻渴飲本源泉寒披無相服熱來松下眠知身無究竟任運了殘年霧重日難出雲厚月朧朧有心求覔佛晝夜用心功見夢言將實聞真耳却聾群賊當路坐道理若為通見性若玲瓏多求說處通取他凡聖語到頭渾是空云何為人演離相說如如心鏡俱空靜無實亦無虗心通常默用出世入無餘梵釋咸恭敬菩薩亦同居語是凡夫語理合釋迦書若能如是學不枉用工夫寅朝飲稀粥飯後兩束薪貨得二升米支我有餘身身無饑火逼安余無相神神安佛土淨內外絶埃塵無間說般若豁達啓關津火燒家計盡全成無事人圓鏡朗如日湧出無礙智梵語波羅蜜唐言無量義說者說無相離者離文字但說無上道利他還自利若能入理行不動到如地緣事常區區不如展腳睡我觀三界有有人披草舍蛇鼠同穴住白日恆如夜鳩鴿為親情羅剎同心話五狗常嘷吠思之令人怕我觀總是幻虗空名亦假放牛喫草庵三身同一化如來一真智遍滿娑婆界殷勤說方便有人自不解無處不生心有處多貪愛心王作黑業教他口懺悔口懺心不改心口相違背不服無心藥病根終不差著相求菩提不免還他債香山有栴檀寶山無伊蘭金山照毛頭毛頭百億寬淨心空室坐妙德四方安空生知內外相事付阿難如能達此理無處即泥洹若能相用語教君一箇訣捻取三毒箭一時總拗折田地成四空五狗牙總缺色蘊自消亡六賊俱磨滅閻羅成法王羅剎成菩薩勿論己一身舉國一時悅達人知是幻縱損心亦如諸天不免難況復此閻浮須尋無上理莫更苦踟蹰衣食才方足不用積盈餘少欲有涅槃知足非凡夫當來無地獄現在出三塗外若絶攀緣歡喜常現前本來何所得吉祥自現形空生稱長老燃燈常照明彌勒是同學釋迦是長兄神通次第坐無勞問姓名名相有差別法身同一形大乘一等義本自無遮閉凡夫著相求心生有執滯無心為真空空寂為本體無問亦無說常照勿使廢佛子行道已更莫愁來去無念清涼寺蘊空真五臺對境心無垢當情心死灰妙理於中現優曇空裏開無求真法眼離相見如來若能如是學不動出三災常聞阿閦佛擬向東方討今日審思惟不動自然到語汝守門奴何須苦煩燥我奏父王知與汝改名號破却有為功顯示無為道識樂衆生樂緣繩妄走作智樂菩薩樂無繩亦無縛若有發心者直須學無作莫道怕落空得空亦不惡見礦不別金入礦方知錯苦痛役身心勞神覔官職暫得色毛披拍按作瞋色口口打奴兵聲聲遣肋聞道送王老曲亦變成直縱令有理道分疏亦不得家長自飲酒舉家一時醉失火燒故宅運水沃空地水火當頭發三災一時起空中鳩鴿舞騾來助放屁因中無好花結果亦天理學道迷路人實是可憐許被賊妄牽纏惡緣取次與有法遍娑婆開眼看佛語洗舌讀經典和經弄蛇鼠動念三界成迷失當時路身現凡夫事內照自分明三千大千界滿中諸衆生剎那造有業了了總知情納安芥子裏稱為無相經常持人不識念時無色聲學佛作夢事不須論地獄天堂總越却六識為僮僕心心無所住處處塵不著五道絶人行無心是極樂空裏見優曇衆生作橋彴欲得速成佛祇學無生忍非常省心力當時煩惱盡七寶藏門開智慧無窮盡廣演波羅蜜無心可鄙吝祇恐著有人愚癡自不信世人皮上黠心裏沒頭癡他貪目前利焉知已後非謾胡欺得漢誇道手腳遲走向見閻老倒拖研米槌恐君不覺悟今日報君知中人樂寂靜下士好威儀菩薩心無礙同凡凡不知佛是無相體何須有相持但令心了事遮莫外人疑如人渴飲水冷暖心自知識若不受塵心亦不顛狂妙智作心師名為破有王須臾證六度動用五種香此即真極樂亦是真西方釋迦無量壽同居此道場俗務不廢作內祕貪心學世上假名聞超然總莫著息念三界空無求出五濁法報皆圓滿意根成正覺若能如此修輪王亦不博五蘊若實有則合有色形五蘊若實無則合無形聲祇為假名字所以妄來停若了名相空事盡總惺惺心王無障礙擺撥三界行我是凡夫身樂說真如理為性不慳貪常行平等施凡夫事有為佛智超生死作佛作凡夫一切自繇你耳聞無相理眼空不受色鼻嗅無相香舌嘗無相食身著無相衣意隨無相得心靜越諸天神清見彌勒十方同一乘無心記南北慈悲說斯法現疾為衆生純陀獻後供妙德亦同行名相有差別法身同一形化身千萬億方從立空名不須執有法圓通最大精欲得真成佛無心於萬物心如境亦如真智從如出定慧等莊嚴廣演波羅蜜流通十方界諸有不能疾報汝學道人祇麼便成佛讀經須解義解義始修行若能依義學即入涅槃城讀經不解義多見不如盲緣文廣占地心中不肯耕田田總是草稻從何處生有人道不得是伊心王黑不能自了事埋藏一群賊群賊多貪癡緣事說是非心王被賊使劫劫無出期見花不識樹果熟始應知君家住聚落余自居山谷山空無有物聚落百種有有者喫飯食無者空張口口空肚亦空還將空喫有有盡物歸空同體無前後諸佛與衆生元來同一家不識親尊長外面認假爺優曇不肯摘專採葫蘆花葫蘆花未落常被三五拁如斯之等類輪轉劫恆沙余為田舍翁世上最貧窮家中無一物啓口說空空舊時惡知識總度作師僧和合一處坐常教聽大乘食時與持鉢唯我一人供平等無有二終日同宅住世人不了妄心生外緣取取得外相佛樂却變成苦苦即諸法生大海從何渡為報知音者好好看道路故宅有寶珠却向田野求這箇一群賊賺你徒悠悠泥上搽粧粉壁上塗渾油愚人見夢事讚歎道能修臘月三十日元無一物收山中失却心任運騰騰語語即說空空空中無蛇鼠有心波浪起無心是淨土淨土生真佛佛還傳佛語佛能度衆生衆生是佛母心王不能了何不依真智一吼百獸伏盡見無生理無生理甚寬無心無可看非內外中間非生死涅槃諸法無住處遨遊神自安外求非是寶無念自家珍心外求佛法總是倒行人般若名尚假豈可更依文有相皆虗妄無形實是真日用事無別唯吾自偶諧頭頭非取捨處處勿張乖朱紫誰為號青山絶塵埃神通并妙用運水及搬柴意根無自性萬法本來虗外塵都不有三界自然無五蘊今何在盡總入無餘河沙過去佛並在一毛如名相本來無迷人意欲須須時權為說迷過患須除般若無是非無實亦無虗八萬四千卷終歸同一如人有一卷經無相亦無名無人能轉讀有我不能聽如能轉讀得入理契無生非論菩薩道佛亦不勞成阿爺當殿坐子向前頭立父子同宅住小魔不敢入時開無盡藏貧者相供給得之永不窮免得生憂悒欲得真醍醐三毒須去除嗅無酥酪氣自見如意珠劫火燒不然泛海浪中浮昔日強索者今日作他奴報汝尋真理偷生佯不聞及其身命卒心口便紛紜我命不能與將錢別雇人為讀如來教救護我精神城內數萬戶不奈我恆一時時師子吼禽獸俱皆卒教作羅睺羅無蹤持戒律但知入理坐日頭骨咄出
