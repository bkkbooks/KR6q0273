body:
  text: 眾生多品䫫諸佛祇一般庶人見天子知隔幾重關若有過人策欲見亦不難策中契聖理坐取國家官智度本來如眾生病盡除又度作護法一切入無餘過去恒沙佛皆同此一途如能達此理凡夫非凡夫四大本無情清虗無色聲達人悟空理知法本無生諸佛常現前妙德亦同行無無無障礙心牛不肯耕塵六門前喚無情呼不入二彼總空空自然唇不濕從此絕因緣葛五隨緣出惟有空寂舍圓八同金七入理如箭射尋文轉相背直道不肯行識路成迷退心王不了事公臣生執礙為此一群賊生死如踏碓覺他欲打你著脚即須抽已後再相見他羞我不羞忍辱第一道歷劫無冤讎此是無生縣不屬涅槃洲罵他無便宜不應却得穩無瞋神自安罵他還自損忍得有法利罵他還折本瞋喜同一如遁世不悶悶識業人稀少迷途者眾多苦中生樂想無喜強絃歌不飲尋常醉昏昏溺愛河含笑造殃咎後苦莫繇他耳聞他罵詈心知口莫對惡亦不須嫌好亦不須愛豁達無關津虗空無礙此真不動佛亦名觀自在仰手是天堂覆手是地獄地獄與天堂我心都不屬化城猶不止豈況諸天福一切都不求曠然無所得佛有一等慈有人心不知一切皆平等貧富總憐伊富者你莫貪貧者你莫癡無貪心自靜無癡意莫思白衣不執相真理從空生祇為心無礙智慧出縱橫唯論師子吼不許野干鳴菩提稱最妙猶呵是假名從根誅則絕從根修則滅若能雙株斷三乘盡超越此非凡夫言妙吉分明說如來所療治一差不復發久種善根深同塵塵不侵非關塵不染自是我無心無心心不起超三越十地究竟真如果到頭祇箇是凡夫智量狹妄說有難易離相如虗空盡契諸佛智戒相如虗空迷人自作持病根不肯拔執是弄花枝牽牛駕空車共入無為宅無為宅甚寬眾生却嫌窄十方同一室何曾有間隔有法人不得無心自度厄世間最上事唯有修道強若悟無生理三界自消亡蘊空妙德現無念是清凉此即彌陀土何處覔西方寶珠內衣裏繫來無量時遇六惡知識又常假慈悲牽我飲欲酒醉臥都不知情盡酒復醒自見本道師世人重珍寶我貴剎那靜金多亂人心靜見真如性性空法亦空十八絕行蹤但自心無礙何愁神不通端坐求如法如法轉相違拋法無心取始自却來歸無求出三界有念則成癡求佛覔解脫不是丈夫兒惡心滿三界口即念彌陀心口相違背群賊轉轉多一塵起萬境倐忽遍娑婆色聲求佛道結果盡成魔萬法從心起心生萬法生法生有日了來去枉虗行寄語修道人空生有莫生如能達此理不動出深坑佛亦不離心心亦不離佛心寂即菩提心然即有物物即變成魔無即無諸佛若能如是用十八從何出羊車誘下愚鹿車載中夫大乘為上士鵬巢鶴不居鷦鷯住蚊睫居士咄盲驢若論質利帝畢竟一乘無有人嫌龐老龐老不嫌他開門待知識知識不來過心如具三學塵識不相和一丹療萬病不假藥方多淼淼長江水周而還復始昏昏三界人輪迴亦如此輪迴改形貌長江色不異改貌勞神識終須到佛地睡來展脚睡悟理起題詩詩中無別意唯勸破貪癡貪瞋癡若盡便是世尊兒無煩問師匠心王應自知世人重名利余心總不然束薪貨升米清水鐵鐺煎覺熟捻鐺下將身近畔邊時時拋入口腹飽肚無言行學非真道徒勞神與軀千里尋月影終是枉工夫不悟緣聲色當今學者疎但看起滅處此箇是真如教君殺賊法不用苦多方慧劒當心刺心亡法亦亡心亡極樂國法亡即西方賊為象馬用神自作空王不用苦多聞看他彼上人百憶及日月元在一毛塵心但寂無相即出無明津若能如是學幾許省精神慚愧好心王生在蓮華堂恒持般若劒終日帶浮囊常懷第一義外國賴恩光五百長者子相隨歸故鄉慚愧好意根無自亦無他無自身無垢無他塵不加常居清淨地知有不能過舊時惡知識總見阿彌陀慚愧好舌根常開大道門世間三有事實是不能論相逢唯說道更莫敘寒溫了知世相假俗禮也徒煩慚愧一雙耳常思解脫聲若論俗語話實是不能聽聞財耳不納聞色心不生不受有無語何慮不惺惺慚愧一雙眼曾見數般人端正亦不愛醜陋亦不瞋當頭異國色何須妄起塵低頭自形相都無一處真身心如幻化滿眼沒怨親慚愧一軀身梵號波羅柰被賊一群使尋常不自在亦名為枯井亦名為鞲袋亦名朽故宅亦名幻三昧佛罵作死屍乘屍渡大海大海元無水死屍非是船熟看世上事總是假因緣若了身心相空裏任橫眠具此六慚愧實是不求天一時復一時步步向前移無常有限分早晚即不知古人一交語預辦沒貧兒聞少須修道莫待衰老時邂逅符到來賺你更無疑勸君不肯聽三塗真可悲一日復一日百年漸漸畢急急除妄想無念成真佛更莫苦攀緣窺他世上物忽然無常至累劫出不得一宿復一宿光陰漸漸促報你心王道依智莫依識依智見真佛依識入地獄若淪六趣中受苦無時足一年復一年務在且遷延皮皺緣肉減髮白髓枯乾毛孔通風過骨消椽梠寬水微不耐熱火少不耐寒幻身如聚沫四大亦非堅更被癡狼使無明曉夜煎惟知念水草心神被物纏云何不懺悔便道捨財錢外頭遮曲語望得免前愆地獄應無事凖擬得生天世間有這屬冥道不如然除非不作業當拔罪根源根空塵不實內外絕因緣積罪如山岳慧火一時燃須臾變灰燼永劫更無煙迷時三界有悟即出囂纏心無六入跡清淨達本源地獄成淨土招手別諸天報語三塗宅共你更無緣非論早與晚悟理即無邊心如即是坐境如即是禪如如都不動大道無中邊若能如是達所謂火中蓮無求乃法眼有念却成魔無求復無念即是阿彌陀真如共菩薩總祇較無多鍊盡三山鐵鎔銷五岳銅林枯鳥自散海竭絕魚龍無師破戒行有法盡皆空菩薩無煩惱眾生愛皺眉無惱緣無賊皺眉被賊欺不須問師匠心王應自知智者觀財色了知是幻虗衣食支身命相勸學如如時至移庵去無物可盈餘凡夫貪著事不免三界輪與說無生理閉耳佯不聞如斯之等䫫何日出囂塵壁𦘕枉用色不如脫空佛住法比無住陰中對白日不信有無言看取波羅蜜見時如不見聞時如不聞喜時如不喜瞋時如不瞋一切盡歸如自然無我人齋須實相齋戒須實相戒有相持齋戒到頭歸敗壞敗壞屬無常從何免三界心王不了事遮莫向名山縱令見佛像實以不相關猿猴見水月捉月始知難緣事求解脫累劫無出期直須入理性成佛更無疑雖然不受記見是世尊兒佛遣滅生滅生滅長相隨不學大人相却作小孫兒持心更覔佛豈不是愚癡無事被他罵佯佯耳不聞舌亦不須動心亦不須嗔關津無障礙即是出纏人真如本無相所得是凡流昔時為父子長大出外遊今日相遇見父少子白頭一生解縛鈍渾身納裏眠心中無意識耳無繩索牽心本無繫縛同塵亦無喧欲得真解脫持刀且殺牛牛死人亦亡佛亦不須求全身空裏坐即度死生流極目觀前境寂寥無一人廻頭看後底影亦不隨身貪瞋不肯捨徒勞讀釋經看方不服藥病從何處輕取空是取色取色色無常色空非我有端坐見家鄉經體本無名受持無色聲心依無相理真是金剛經孫兒正啼哭母言來與金捻他黃葉把便即正聲音別淚成河海骨如毗富山祇緣塵識法所以遣心然前人若有事我猶佯不知何況他無問讒舌強卑卑勸君師子吼莫學野干鳴若能香象起感得鳳凰迎一種學事業亦來登選場祇緣口義錯落第在他鄉心王不了事却被六賊使共賊作火下無繇出生死別人終不賤別寶終不貧祇今擔鐵漢不肯愽金銀十方同一會各自學無為此是選佛處心空及第歸有男不肯婚有女不肯嫁父子自團欒共說無生話四性同一舍三身同一室一切惡知識總見彌陀佛教君一箇法有事無處避若能如理修存本却有利道是無為道修人自有為假即無頭數真中實是稀無求勝禮佛知足勝持齋本自無薪火何勞更拾柴說事滿天下入理實無多常被有為縛何日見彌陀起時惟法起行時共佛行騰騰三界內諸法自無生大海淼無涯眾生自著枷無求出妙德心生勞算沙一念心清淨處處蓮花開一華一淨土一土一如來七言大唐三百六十州我暫放閑乘興遊瞬息之間知事盡若論入理更深幽共外知識呷清水總是妄想無骨頭却歸東西山道去不捨因緣騎牯牛後望青山平似掌前瞻漢水水東流試問西域那提子遺法慇懃無所求自入大海歸火宅不覺乘空失却牛有人見我歸東土我本元居西海頭來去自然無障礙出入生死有何憂無思無念是真空妙德法身自見中應機接物契真智十方世界總流通通達無我無人法人法不見有行蹤神識自然無罣礙廓周沙界等虗空不假坐禪持戒律超然解脫豈勞功菩提般若名相假涅槃真如亦是虗欲得心神真解脫一切名相本來無十方世界風塵淨州州縣縣絕艱虞王道蕩蕩無偏黨舉國眾生同一如不動干戈安萬姓法王合掌髻中珠空中自見清涼月一光普照娑婆徹此光湛然無去來不增不減無生滅爾是妙德現真身剎那不起恒沙劫無邊無盡如虗空虗空無邊不可說但自無心於萬物何妨萬物常圍遶鐵牛不怕師子吼恰似木人見花鳥木人本體自無情花鳥逢人亦不驚心境如如祇箇是何慮菩提道不成清淨無為無識塵不捨肉身妙法身祇為眾生有漏習權止草庵轉法輪法輪常轉無人見優曇時時一出現無相真空妙法身歷劫恒沙不遷變莫求佛兮莫求人但自心裏莫貪瞋貪瞋癡病前頓盡便是如來的的親內無垢兮外無塵中間豁達無關津神無障礙居三界恰似瑠璃處日輪心王若解依真智一切有無俱遣棄身隨世流心不流夜來眼睡心不睡天堂地獄總無情任運幽玄到此地報汝世人莫癡憨暫時權住此草庵無想衣食飽暖後世間有物不須貪此身幻化如燈𦦨須臾不覺即頭南一切有求枉用功想念真成著色空差之毫𨤲失千里有生劫劫道難通癡心望出三界外不知元在鐵圍中十二部經兼戒律執相依文常受持生生獲得有為果隨在三界無出期若能離相直入理理中無念亦無思貝多葉裏優曇華萬象皆如同一家歡喜摘華不見菓吉祥採菓不觀華緣之本來元不識法王呵之如稻麻田舍老翁入聚落眼耳鼻舌俱失却內外尋訪覔無蹤舊時住處空寂寞却歸堂上問空王總在此間學無作黃葉飄零化作塵本來非妄亦非真有情故宅含秋色無名君子湛然春未識龍宮莫說珠從來言說與君殊空拳祇是嬰兒信豈得將來誑老夫迷時愛欲心如火心開悟理火成灰灰火本來同一體當知妄盡即如來真為家貧無一物此語總是空裏出出語還須歸本源不敢違他過去佛父子相守空山坐無相如如寄有間世人見靜元無靜看似閑時亦不閑八萬四千同一理事相差別立異名十二圍陀及疏論慇懃三六不須生十方國土皆吾宅長者大門常日開有識名人守院外無心入理見如來世人愛假不愛真世人憐富却憎貧唯敬三塗八不淨背却如來妙色身更無別路超生死前佛後佛同一般舒即周流十方剎斂時還在一毛端惟有一門無鑰匙伸縮低昂說是非但能宣得無生理善巧方便亦從伊二乘皆曰不堪任上士之人智慧深欲得神通等居士無過於物總無心雜句行路易行路易內外中間依本智本智無情法不生無生即是入正理非色非心放一光空裏優曇顯心地名為智智為尊心智通同達本源萬物同歸不二門有非有兮理常存無非無兮無有根未來諸佛亦如是現在還同古世尊三世俱皆無別道佛佛相授至今傳外無他兮內無自不動干戈契佛智通達佛道行非道不捨凡夫有為事有為名相盡空華無名無相出生死余有一大衣非是世間絹眾色染不著晶晶如素練裁時不用刀縫時不用線常持不離身有人自不見三千世界遮寒暑無情有情悉覆遍如能持得此大衣披了直入空王殿思思低思思自歎一雙眉向他勝地坐萬事總不知六識若似眉即得不思議六識若嫌眉論時沒腦癡伊若去却眉即被世人欺饒你六識嘍囉漢成乞索兒出一屋入一屋來來去去教他哭來去祇為貪瞋癡于今悟罷須知足知足常須達本源去却昔時惡知識惡知識將伊作手力法施無前後共護無生國無事失却心走向門前覔借問舊知識寂絕無蹤跡却歸堂上審思看改却眾生稱心安不能出外求知識自向家中入涅槃大丈夫昔日有今日無家計破除盡贖得一群奴奴婢有六人一人有六口六六三十六常隨我前後我亦不拘伊伊亦不敢走若道菩提難菩提亦不難少欲知足毛頭寬遠離財色神自安分明了見三塗苦世上名聞不相關難復難持心離欲貪涅槃一向他方求淨土若論實行不相關枉用工夫來去苦畢竟到頭空色還易復易即此五陰成真智十方世界一乘同無相法身豈有二若捨煩惱覔菩提不知何方有佛地正中正心王如如六根瑩六塵空六識淨六六三十六同歸大圓鏡阿難貝多葉持來數千劫七寶藏中付迦葉分為十二部析作三乘法非故亦非新應化隨緣百億身若有真如一合相一億還同一聚塵珠從藏中現顯赫呈光輝昔日逃走為窮子今日還家作富兒心依真智理逐心行理智無礙心亦無生迷即有我悟即無情通達大智諸法不成五神無主六國安寧七死弗受八鏡圓明隨宜善化總合佛經過即已過更莫再尋現在不住念念勿侵未來未至亦莫預斟既無三世心同佛心依空默用即是行深無有少法觸目平任無戒可持無垢可淨洞達虗心法無壽命若能如是圓通究竟居士見僧講金剛經至無我無人居士問云既無我無人是誰講誰聽座主無語居士乃與頌曰無我復無人作麼有踈親勸師休歷座不似直求真金剛般若性外絕一纖塵我聞并信受總是假名陳歷代讚文并諸方拈古附大丞相張天覺寧可饑寒死路邊不勞土地強哀憐滿船家計沉湘水豈羨芒繩十百錢徑山佛日大慧禪師無生本無說說著即話墮骨肉團欒頭大虫看水磨舉居士問馬大師不與萬法為侶者是什麼人大師云待汝一口吸盡西江水却向汝道東林珪老大海波濤淺小人方寸深海枯終見底人死不知心雲門杲公禪師一口吸盡西江水甲乙丙丁庚戊己咄咄咄囉囉哩白雲端和尚一口吸盡西江水萬古千今無一滴要須黨理不黨親馬祖可惜口門窄舉居士問仰山久嚮仰山到來為什麼却覆仰山竪起拂子居士云恰是仰山云是仰是覆居士拍露柱一下云雖無人見露柱與我證明仰山擲下拂子云一任舉似諸方兩箇八文為十六從頭數過猶不足拏來亂撒向階前滿地團團春蘚綠
