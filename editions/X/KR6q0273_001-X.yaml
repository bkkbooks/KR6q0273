body:
  text: 節度使于頔編集優婆塞世燈重梓襄州居士龐蘊字道玄衡州衡陽縣人也世本儒業少悟塵勞志求真諦唐貞元初謁石頭禪師乃問不與萬法為侶者是甚麼人頭以手掩其口豁然有省一日石頭問曰子見老僧以來日用事作麼生士曰若問日用事即無開口處頭曰知子恁麼方始問子士乃呈偈曰日用事無別唯吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號丘山絕點埃神通并妙用運水與搬柴頭然之曰子以緇耶素耶士曰願從所慕遂不剃染居士後之江西參馬祖大師問曰不與萬法為侶者是什麼人祖曰待汝一口吸盡西江水即向汝道士於言下頓領玄旨遂呈偈有心空及第之句乃留駐參承二載有偈曰有男不婚有女不嫁大家團圞頭共說無生話士一日又問祖曰不昧本來人請師高著眼祖直下士曰一等沒絃琹惟師彈得妙祖直上士禮拜祖歸方丈士隨後曰適來弄巧成拙士一日又問祖曰如水無筋骨能勝萬斛舟此理如何祖曰這裏無水亦無舟說什麼筋骨居士到藥山禪師山問曰一乘中還著得這箇事麼士曰某甲祇管日求升合不知還著得麼山曰道居士不見石頭得麼士曰拈一放一未為好手山曰老僧住持事繁士珍重便出山曰拈一放一的是好手士曰好箇一乘問宗今日失却也山曰是是居士因辭藥山山命十禪客相送至門首士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處士遂與一掌全曰也不得草草士曰恁麼稱禪客閻羅老子未放你在全曰居士作麼生士又掌曰眼見如盲口說如瘂居士到齊峰纔入院峰曰箇俗人頻頻入院討箇什麼士乃回顧兩邊曰誰恁麼道誰恁麼道峰便喝士曰在這裏峰曰莫是當陽道麼士曰背後底聻峰回首曰看看士曰草賊大敗草賊大敗峰一日與居士並行次士乃前行一步曰我強如師一步峰曰無背向老翁要爭先在士曰苦中苦未是此一句峰曰怕翁不甘士曰老翁若不堪齊峰堪作箇什麼峰曰若有棒在手打不解倦士便行一摑曰不多好峰始拈棒被居士把住曰這賊今日一場敗闕峰笑曰是我拙是公巧士乃撫掌曰平交平交居士一日又問峰曰此去峰頂有幾里峰曰是什麼處去來士曰可畏峻硬不得問著峰曰是多少士曰一二三峰曰四五六士曰何不道七峰曰纔道七便有八士曰住得也峰曰一任添取士喝便出峰隨後亦喝居士一日又問不得堂堂道峰曰還我恁麼時龐公主人翁來士曰少神作麼峰曰好箇問訊問不著人士曰好來好來丹霞天然禪師一日來訪居士纔到門首見女子靈照携一菜籃霞問曰居士在否照放下菜籃斂手而立霞又問居士在否照提籃便行霞遂去須臾居士歸照乃舉前話士曰丹霞在麼照曰去也士曰赤土塗牛嬭霞隨後入見居士士見來不起亦不言霞乃竪起拂子士竪起槌子霞曰只恁麼更別有士曰這回見師不似於前霞曰不妨減人聲價士曰比來拆你一下霞曰恁麼則瘂却天然口也士曰你瘂繇本分累我亦瘂霞便擲下拂子而去士召曰然闍黎然闍黎霞不顧士曰不惟患瘂更兼患聾丹霞一日又訪居士至門首相見霞乃問居士在否士曰饑不擇食霞曰龐老在否士曰蒼天蒼天便入宅去霞曰蒼天蒼天便回霞一日問居士昨日相見何似今日士曰如法舉昨日事來作箇宗眼霞曰祇如宗眼還著得龐公麼士曰我在你眼裏霞曰某甲眼窄何處安身士曰是眼何窄是身何安霞休去士曰更道取一句便得此語圓霞亦不對士曰就中這一句無人道得居士一日向丹霞前叉手立少時却出去霞不顧士却來坐霞却向士前叉手立少時便入方丈士曰汝入我出未有事在霞曰這老翁出出入入有甚了期士曰却無些子慈悲心霞曰引得這漢到這田地士曰把什麼引霞乃拈起士幞頭曰却似一箇老師僧士却將幞頭安霞頭上曰一似少年俗人霞應喏三聲士曰猶有昔時氣息在霞乃拋下幞頭曰大似一箇烏紗巾士乃應喏三聲霞曰昔時氣息爭忘得士彈指三下曰動天動地丹霞一日見居士來便作走勢士曰猶是拋身勢怎生是嚬呻勢霞便坐士乃回前以拄杖劃地作七字霞於下面書箇一字士曰因七見一見一忘七霞曰這裏著語士乃哭三聲而去居士一日與丹霞行次見一泓水士以手指曰便與麼也還辦不出霞曰灼然是辦不出士乃戽水潑霞二掬霞曰莫與麼莫與麼士曰須與麼須與麼霞却戽水潑士三掬曰正與麼時堪作什麼士曰無外物霞曰得便宜者少士曰誰是落便宜者百靈和尚一日與居士路次相逢靈問曰昔日居士南嶽得力句還曾舉向人也無士曰曾舉來靈曰舉向什麼人士以手自指曰龐公靈曰直是妙德空生也讚嘆不及士却問阿師得力句是誰得知師戴笠子便行士曰善為道路靈更不回首靈一日問居士道得道不得俱未免汝且道未免箇什麼士以目瞬之靈曰奇特更無此也士曰師錯許人靈曰誰不恁麼誰不恁麼士珍重而去靈一日在方丈內坐士入來靈把住曰今人道古人道居士作麼生道士打靈一掌靈曰不得不道士曰道即有過靈曰還我一掌來士近前曰試下手看靈便珍重居士一日問百靈曰是這箇眼目免得人口麼靈曰作麼免得士曰情知情知靈曰棒不打無事人士轉身曰打打靈方拈棒起士把住曰與我免看靈無對居士一日見大同普濟禪師拈起手中笊籬曰大同師大同師濟不應士曰石頭一宗到師處冰消瓦解濟曰不得龐翁舉灼然如此士拋下笊籬曰寧知不直一文錢濟曰雖不直一文錢欠他又爭得士作舞而去濟提起笊籬曰居士士回首濟作舞而去士撫掌曰歸去來歸去來濟一日問居士是箇言語今古少人避得唇舌只如翁避得麼士應喏濟再舉前話士曰什麼處去來濟又舉前話士曰什麼處去來濟曰非但如今古人亦有此語句士作舞而去濟曰這風顛漢自過教誰點檢普濟一日訪居士士曰憶在母胎時有一則語舉似阿師切不得作道理主持濟曰猶是隔生也士曰向道不得作道理濟曰驚人之句爭得不怕士曰如師見解可謂驚人濟曰不作道理却成作道理士曰不但隔一生兩生濟曰粥飯底僧一任點檢士彈指三下居士一日去看普濟濟見居士來便掩却門曰多知老翁莫與相見士曰獨坐獨語過在阿誰濟便開門纔出被士把住曰師多知我多知濟曰多知且置閉門開門卷之與舒相較幾許士曰祇此一問氣急殺人濟嘿然士曰弄巧成拙居士到長髭禪師值上堂大眾集定士便出云各請自檢好髭便示眾士却於禪床右立時有僧問不觸主人公請師答話髭云識龐公麼僧云不識士便搊住其僧云苦哉苦哉僧無對士托開髭少間却問士云適來這僧還喫棒否士云待伊甘始得髭云居士只見錐頭利不見鑿頭方士云恁麼說話某甲即得外人聞之要且不好髭云不好箇甚麼士云阿師只見鑿頭方不見錐頭利居士同松山和尚喫茶次士舉槖子曰人人盡有分為什麼道不得山曰祇為人人盡有所以道不得士曰阿兄為什麼却道得山曰不可無言也士曰灼然灼然山便喫茶士曰阿兄喫茶為什麼不揖客山曰誰士曰龐公山曰何須更揖後丹霞聞乃曰若不是松山幾被箇老翁惑亂一生士聞之乃令人傳語霞曰何不會取未舉槖子時居士一日與松山看耕牛次士指牛曰是伊時中更安樂只是未知有山曰若非龐公又爭識伊士曰阿師道渠未知有箇什麼山曰未見石頭不妨道不得士曰見後作麼生山撫掌三下居士一日到松山見山携杖子便曰手中是箇什麼山曰老僧年邁闕伊一步不得士曰雖然如是壯力猶存山便打士曰放却手中杖子致將一問來山拋下杖子士曰這老漢前言不付後語山便喝士曰蒼天中更有怨苦居士一日與松山行次見僧擇菜山曰黃葉即去青葉即留士曰不落黃葉又作麼生山曰道取士曰不為賓主大難山曰只為強作主宰士曰誰不恁麼山曰不是不是士曰青黃不留處就中難道山曰也解恁麼去士珍重大眾山曰大眾放你落機處士便行一日松山與居士話次山驀拈起案上尺子云還見這箇麼士曰見山曰見箇什麼士曰松山松山山曰不得不道士曰爭得山乃拋下尺子士曰有頭無尾得人憎山曰不是翁今日還道不及士曰不及箇什麼山曰有頭無尾士曰強中得弱即有弱中得強即無山抱住居士曰這個老子就中無話處居士問本谿和尚丹霞打侍者意在何所谿曰大老翁見人長短在士曰為我與師同參方敢借問谿曰若恁麼從頭舉來共你商量士曰大老翁不可共你說人是非谿曰念翁年老士曰罪過罪過本谿一日見居士來乃目視多時士乃將杖子畫一圓相谿便近前以脚踏士曰是什麼是什麼谿却於居士前畫一圓相士亦以脚踏谿曰來時有去時無士抱拄杖而立谿曰來時有去時無士曰幸自圓成徒勞目視谿拍手曰奇特一無所得士拈杖子點點而去谿曰看路看路士曰是什麼是什麼居士訪大梅禪師纔相見便問久嚮大梅未審梅子熟也未梅曰熟也你向什麼處下口士曰百雜碎梅伸子曰還我核子來士便去居士到芙蓉山大𭯉禪師處𭯉行食與居士士擬接毓縮手曰生心受施淨名早訶去此一機居士還甘否士曰當時善現豈不作家毓曰非關他事士曰食到口邊被他奪却毓乃下食士曰不消一句子士又問毓曰馬大師著實為人處還分付吾師否毓曰某甲尚未見他作麼生知他著實處士曰祇此見知也無討處毓曰居士也不得一向言說士曰一向言說師又失宗若作兩向三向師還開得口否毓曰直是開口不得可謂實也士撫掌而出居士相看則川和尚次川曰還記得見石頭時道理否士曰猶得阿師重舉在川曰情知久參事慢士曰阿師老耄不啻龐公川曰二彼同時又爭幾許士曰龐公鮮徤且勝阿師川曰不是勝我祇欠汝箇幞頭士拈下幞頭曰恰與師相似川大笑而已一日則川摘茶次士曰法界不容身師還見我否川曰不是老僧洎答公話士曰有問有答盖是尋常川乃摘茶不聽士曰莫怪適來容易借問川亦不顧士喝曰這無禮儀老漢待我一一舉向明眼人川乃拋却茶籃便歸方丈川一日在方丈內坐士見曰只知端坐方丈不覺僧到參時川垂下一足士便出三兩步却回川却收足士曰可謂自由自在川曰爭奈主人何士曰阿師只知有主不知有客川喚侍者點茶士乃作舞而出居士到洛浦禪師拜起曰仲夏毒熱孟冬薄寒浦曰莫錯士曰龐公年老浦曰何不寒時道寒熱時道熱士曰患聾作麼浦曰放汝二十棒士曰瘂却我口塞却汝眼石林和尚見居士來乃竪起拂子曰不落丹霞機試道一句子士奪却拂子却自竪起拳林曰正是丹霞機士曰與我不落看林曰丹霞患瘂龐公患聾士曰恰是林無語士曰向道偶爾林一日問居士某甲有箇借問居士莫惜言語士曰便請舉來林曰元來惜言語士曰這箇問訊不覺落他便宜林乃掩耳士曰作家作家林一日自下茶與居士士纔接茶林乃抽身退後曰何似生士曰有口道不得林曰須是恁麼始得士拂袖而去曰也太無端林曰識得龐翁也士却回林曰也太無端士無語林曰也解無語去居士訪仰山禪師問久響仰山到來為甚麼却覆山竪起拂子士曰恰是山曰是仰是覆士乃打露柱曰雖然無人也要露柱證明山擲拂子曰若到諸方一任舉似居士訪谷隱道者隱問曰誰士竪起杖子隱曰莫是上上機麼士拋下杖子隱無語士曰只知上上機不覺上上事隱曰作麼生是上上事士拈起杖子隱曰不得草草士曰可憐強作主宰隱曰有一機人不要拈槌竪拂亦不用對答言辭居士若逢如何則是士曰何處逢隱把住士乃曰莫這便是否驀面便唾隱無語士與一頌曰焰水無魚下底鈎覓魚無處笑君愁可憐谷隱孜禪伯被唾如今見亦羞居士因在床上臥看經有僧見曰居士看經須具威儀士翹起一足僧無語居士一日在洪州市賣笊籬見一僧化緣乃將一文錢問曰不辜負信施道理還道得麼道得即捨僧無語士曰汝問我與汝道僧便問不辜負信施道理作麼生士曰少人聽又曰會麼僧曰不會士曰是誰不會居士一日見牧童乃問路從什麼處去童曰路也不識士曰這看牛兒童曰這畜生士曰今日什麼時也童曰插田時也士大笑居士甞遊講肆隨喜金剛經至無我無人處致問曰座主既無我無人是誰講誰聽主無對士曰某甲雖是俗人粗知信向主曰祇如居士意作麼生士以偈答曰無我復無人作麼有疎親勸君休歷座不似直求真金剛般若性外絕一纖塵我聞并信受總是假名陳主聞偈欣然仰嘆居士所至之處老宿多往復酧問皆隨機應響非格量軌轍之可拘也居士一日在茅廬裡坐驀忽云難難難十碩油麻樹上攤龐婆云易易易如下眠床脚踏地靈照云也不難也不易百草頭上祖師意元和中居士北遊襄漢隨處而居有女靈照常鬻竹漉籬以供朝夕士有偈曰心如境亦如無實亦無虗有亦不管無亦不拘不是賢聖了事凡夫易復易即此五蘊有真智十方世界一乘同無相法身豈有二若捨煩惱入菩提不知何方有佛地護生須是殺殺盡始安居會得箇中意鉄船水上浮居士一日坐次問靈照曰古人道明明百草頭明明祖師意如何會照曰老老大大作這箇語話士曰你作麼生照曰明明百草頭明明祖師意士乃笑居士因賣漉籬下橋喫撲靈照見亦去爺邊倒士曰汝作什麼照曰見爺倒地某甲相扶居士將入滅謂靈照曰視日早晚及午以報照遽報日已中矣而有蝕也士出戶觀次照即登父座合掌坐亡士笑曰我女鋒捷矣于是更延七日州牧于頔問疾士謂之曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖枕于公膝而化遺命焚棄江緇白傷悼謂禪師龐居士即毗耶淨名矣有詩偈三百餘篇傳於世
